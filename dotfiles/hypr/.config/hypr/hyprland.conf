$mod = SUPER

# TODO: configure dynamically
$externalMonitorConfig = HDMI-A-1,1920x1080@60,0x0,1
$internalMonitorConfig = eDP-1,2560x1440@165,0x1080,1.6
monitor=$externalMonitorConfig
monitor=$internalMonitorConfig

xwayland {
    force_zero_scaling = true
}

$terminal = ghostty
$fileManager = nautilus
$menu = fuzzel
# TODO: should be dynamically injected from a local config
$keyboard = "ite-tech.-inc.-ite-device(8910)-keyboard"


exec-once = wl-clip-persist --clipboard regular &
exec-once = qs -c noctalia-shell --no-duplicate
exec-once = copyq --start-server

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    allow_tearing = true
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    0,     1.94,  almostLinear, fade
    animation = workspacesIn,  0,     1.21,  almostLinear, fade
    animation = workspacesOut, 0,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    preserve_split = true
    force_split = 2
}

scrolling {
    fullscreen_on_one_column = true
}

bind = $mod, period, layoutmsg, swapcol r
bind = $mod, comma, layoutmsg, swapcol l
bind = $mod, semicolon, layoutmsg, fit visible
bind = $mod, P, layoutmsg, promote
bind = $mod SHIFT, R, layoutmsg, colresize +conf

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

input {
    kb_layout = us,ru,ua
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps
    kb_rules =
    repeat_rate = 60
    repeat_delay = 300

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        scroll_factor = 0.2
        drag_lock = 1
    }
}

group {
    col.border_active = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.border_inactive = rgba(595959aa)

    groupbar {
        font_size = 12
        gradients = true
        gradient_rounding = 6
        indicator_height = 0

        text_color = rgba(000000ff)
        text_color_inactive = rgba(ffffffff)
        col.active = rgba(33ccffcc)
        col.inactive = rgba(595959aa)
        col.locked_active = rgba(ff5500cc)
        col.locked_inactive = rgba(775500aa)
    }
}

gesture = 3, horizontal, workspace

bind = $mod, S, exec, hyprctl keyword workspace $(hyprctl activeworkspace -j | jq ".id"), layout:scrolling
bind = $mod, D, exec, hyprctl keyword workspace $(hyprctl activeworkspace -j | jq ".id"), layout:dwindle
bind = $mod, M, exec, hyprctl keyword workspace $(hyprctl activeworkspace -j | jq ".id"), layout:master

bind = $mod SHIFT, M, exec, hyprctl keyword monitor $externalMonitorConfig; hyprctl keyword monitor eDP-1,disable
bind = $mod SHIFT, N, exec, hyprctl keyword monitor $internalMonitorConfig; hyprctl keyword monitor HDMI-A-1,disable
bind = $mod SHIFT, B, exec, hyprctl keyword monitor $internalMonitorConfig; hyprctl keyword monitor $externalMonitorConfig

bind = $mod SHIFT_ALT, L, exec, swaylock --color=000000 --show-failed-attempts

bind = ALT, W, togglegroup
bind = ALT, H, changegroupactive, b
bind = ALT, L, changegroupactive, f
bind = ALT_SHIFT, H, exec, hyprctl --batch "dispatch movegroupwindow b; dispatch changegroupactive b"
bind = ALT_SHIFT, L, exec, hyprctl --batch "dispatch movegroupwindow f; dispatch changegroupactive f"
bind = ALT, I, lockactivegroup, toggle
bind = ALT, U, moveoutofgroup,
bind = ALT, H, moveintogroup, l
bind = ALT, J, moveintogroup, d
bind = ALT, K, moveintogroup, u
bind = ALT, L, moveintogroup, r

bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | GTK_THEME=Adwaita:dark swappy -f -
bind = $mod, V, exec, copyq show

bind = $mod, Return, exec, $terminal
bind = $mod, Q, killactive,
bind = $mod ALT, E, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mod SHIFT, SPACE, togglefloating
bind = $mod, O, exec, $menu
bind = $mod, E, layoutmsg, togglesplit
bind = $mod, F, fullscreen
bind = $mod SHIFT, F, fullscreen, 1

bind = $mod, R, submap, resize
submap = resize
binde = , L, resizeactive, 10 0
binde = , H, resizeactive, -10 0
binde = , K, resizeactive, 0 -10
binde = , J, resizeactive, 0 10
bind = , escape, submap, reset
bind = $mod, R, submap, reset
submap = reset

bind = ALT_SHIFT, 1, exec, hyprctl switchxkblayout $keyboard 0
bind = ALT_SHIFT, 2, exec, hyprctl switchxkblayout $keyboard 1
bind = ALT_SHIFT, 3, exec, hyprctl switchxkblayout $keyboard 2

bind = $mod, H, movefocus, l
bind = $mod, H, bringactivetotop
bind = $mod, L, movefocus, r
bind = $mod, L, bringactivetotop
bind = $mod, K, movefocus, u
bind = $mod, K, bringactivetotop
bind = $mod, J, movefocus, d
bind = $mod, J, bringactivetotop

bind = $mod CONTROL, H, movecurrentworkspacetomonitor, l
bind = $mod CONTROL, L, movecurrentworkspacetomonitor, r
bind = $mod CONTROL, K, movecurrentworkspacetomonitor, u
bind = $mod CONTROL, J, movecurrentworkspacetomonitor, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

bind = , CONTROL_R, pass, class:^(discord)$
# not working for some reason
bind = CONTROL, M, pass, class:^(discord)$

bind = $mod, mouse_down, workspace, e-1
bind = $mod, mouse_up, workspace, e+1

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = copyq-float
    match:class = com.github.hluk.copyq
    no_anim = true
    float = true
    size = 800 600
}

windowrule {
    name = fix-cs2
    match:class = cs2
    immediate = true
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = ghostty-opacity
    match:class = com.mitchellh.ghostty

    opacity = 0.95
}
